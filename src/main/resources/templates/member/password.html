<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form th:action="@{/member/password}" method="post" th:object="${form}">
    <input type="password" th:field="*{currentPassword}" placeholder="현재 비밀번호"/>
    <input type="password" th:field="*{newPassword}" placeholder="새 비밀번호"/>
    <input type="password" th:field="*{confirmPassword}" placeholder="새 비밀번호 확인"/>
    <button type="submit">변경</button>
</form>
</body>
</html>
