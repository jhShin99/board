<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>

<h2>회원가입</h2>

<form th:action="@{/member/join}" method="post">
    아이디:
    <input type="text" name="username" required />
    <br/>

    비밀번호:
    <input type="password" name="password" required />
    <br/>

    <button type="submit">가입</button>
</form>

<a th:href="@{/}">메인으로</a>

</body>
</html>
